name: test
on: [push, pull_request]
jobs:
  test:
    name: test
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        go: ["1.25", "1.26"]
    steps:
      - name: setup Go
        uses: actions/setup-go@v2
        with:
          go-version: ${{ matrix.go }}
      - name: checkout
        uses: actions/checkout@v4
      - name: test
        run: $GITHUB_WORKSPACE/scripts/ci.sh
